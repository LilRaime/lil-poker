apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: poker-hash-policy
  namespace: {{ .Values.namespace }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: lil-poker-routes
  loadBalancer:
    type: ConsistentHash
    consistentHash:
      type: QueryParams
      queryParams:
        - name: "room"
