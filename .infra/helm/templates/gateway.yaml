apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: lil-poker-gateway-class
spec:
  controllerName: {{ .Values.gateway.controllerName }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: lil-poker-gateway
  namespace: {{ .Values.namespace }}
spec:
  gatewayClassName: lil-poker-gateway-class
  listeners:
    - name: http
      protocol: HTTP
      port: 80
